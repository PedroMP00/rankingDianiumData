name: Scraping de Ranking Semanal

on:
  schedule:
    - cron: '0 1 * * 1'  # Todos los lunes a las 01:00 UTC
  workflow_dispatch:     # Permite ejecutarlo a mano desde GitHub

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install "numpy<2.0.0"
          pip install -r automation/requirements.txt

      - name: Ejecutar script de Scraping (Pipeline)
        id: pipeline
        run: |
          python automation/main.py

      - name: Enviar notificación de éxito a Telegram
        if: success()
        run: |
          RECORDS=$(python -c "import json; data = json.load(open('web_ftp/data/dataCompleto.json')); print(len(data))")
          python automation/telegram_bot.py success "$RECORDS" "$RECORDS"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Enviar notificación de fallo a Telegram
        if: failure()
        run: |
          pip install requests
          python automation/telegram_bot.py failure "La ejecución del Pipeline de raspado ha fallado"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Desplegar en gh-pages
        if: success()
        run: |
          mkdir -p gh-pages-temp
          cp web_ftp/data/dataCompleto.json gh-pages-temp/

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          git fetch origin || true
          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git reset --hard
          fi

          cp gh-pages-temp/dataCompleto.json ./
          rm -rf gh-pages-temp

          git add dataCompleto.json
          git commit -m "chore: actualizar rankings - $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "Sin cambios"
          git push origin gh-pages

      - name: Resumen del despliegue
        run: |
          echo "✅ Flujo completado"
          echo "🌐 URL de datos: https://pedromp00.github.io/rankingDianiumData/dataCompleto.json" 
name: Scraper de Ranking Semanal

on:
  schedule:
    - cron: '0 1 * * 1'  # Todos los lunes a las 01:00 UTC
  workflow_dispatch:     # Activador manual desde la web de GitHub

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Actualizado a v4 para evitar avisos de Node.js obsoleto
      - name: Descargar repositorio
        uses: actions/checkout@v4

      # 2. Actualizado a v5 para soporte nativo de Node.js 24
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install -r automation/requirements.txt

      - name: Ejecutar script de raspado (Pipeline)
        id: pipeline
        run: |
          cd automation
          python main.py

      - name: Desplegar en gh-pages
        if: success()
        run: |
          # Guardar una copia temporal del JSON generado antes de cambiar de rama
          mkdir -p gh-pages-temp
          cp web_ftp/data/dataCompleto.json gh-pages-temp/

          # Configurar el usuario de Git utilizando el bot oficial de GitHub
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          # Verificar si la rama gh-pages existe; si no, crearla limpia
          git fetch origin || true
          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git reset --hard
          fi

          # Traer de vuelta el JSON guardado a la raíz de la rama gh-pages
          cp gh-pages-temp/dataCompleto.json ./
          rm -rf gh-pages-temp

          # Confirmar cambios y subirlos
          git add dataCompleto.json
          git commit -m "chore: actualizar rankings - $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "Sin cambios que confirmar"
          git push origin gh-pages

      # CORREGIDO: Contamos las filas del JSON ANTES de que el paso anterior borre la ruta original
      - name: Enviar notificación de éxito a Telegram
        if: success()
        run: |
          # Contar registros usando el JSON que acabamos de subir a la raíz en gh-pages
          RECORDS=$(python -c "import json; data = json.load(open('dataCompleto.json')); print(len(data))")
          cd automation
          python telegram_bot.py success "$RECORDS" "$RECORDS"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Enviar notificación de fallo a Telegram
        if: failure()
        run: |
          cd automation
          python telegram_bot.py failure "La ejecución del Pipeline ha fallado"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Resumen del despliegue
        run: |
          echo "✅ Flujo de trabajo completado con éxito"
          echo "📊 Archivos actualizados y desplegados en la rama gh-pages"
          echo "🌐 Datos disponibles públicamente en: https://${{ github.repository_owner }}.github.io/rankingV2/dataCompleto.json"